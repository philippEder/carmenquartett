server {
    listen 80;
    server_name carmenquartett.at;

    # Required for Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name carmenquartett.at;

    ssl_certificate /etc/letsencrypt/live/carmenquartett.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/carmenquartett.at/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # HTML shell and prerendered pages — revalidate so new JS/CSS names load after deploy
    location ~* \.html$ {
        expires off;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Bundles, styles, images, fonts, JSON under assets — 12 hours
    location ~* \.(?:js|mjs|css|webp|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot|json)$ {
        expires 12h;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}